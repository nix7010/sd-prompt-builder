<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Prompt Builder Pro</title>
<style>
  :root{
    --bg-main:#0f0f1a;--bg-sidebar:#12121f;--bg-input:#161625;--bg-card:#1e1e30;
    --bg-header:linear-gradient(135deg,#1a1a2e,#16213e);
    --border:#222;--border-light:#333;--border-focus:#e94560;
    --text:#e0e0e0;--text-muted:#888;--text-dim:#666;
    --accent:#e94560;--accent-hover:#ff6b81;
    --tag-bg:#1e1e30;--tag-border:#333;--tag-hover:#2a2a45;
    --selected-tag-bg:#2a2a40;--selected-tag-border:#444;
    --cat-big-color:#e94560;--cat-active-bg:#1a1a2e;
    --sub-heading-border:#2a2a3a;
    --toast-bg:#e94560;
    --scrollbar:#333;
  }
  [data-theme="midnight-blue"]{
    --bg-main:#0a1628;--bg-sidebar:#0d1b2a;--bg-input:#111d2e;--bg-card:#162236;
    --bg-header:linear-gradient(135deg,#0d1b2a,#1b2838);
    --border:#1a2a3f;--border-light:#243b55;--border-focus:#4fc3f7;
    --text:#cfd8dc;--text-muted:#78909c;--text-dim:#546e7a;
    --accent:#4fc3f7;--accent-hover:#81d4fa;
    --tag-bg:#162236;--tag-border:#243b55;--tag-hover:#1e3a5f;
    --selected-tag-bg:#1a3050;--selected-tag-border:#2a4a6a;
    --cat-big-color:#4fc3f7;--cat-active-bg:#0d1b2a;
    --sub-heading-border:#1a2a3f;
    --toast-bg:#4fc3f7;
    --scrollbar:#243b55;
  }
  [data-theme="dark-purple"]{
    --bg-main:#1a0a2e;--bg-sidebar:#150826;--bg-input:#1e0e35;--bg-card:#261440;
    --bg-header:linear-gradient(135deg,#1a0a2e,#2d1055);
    --border:#2a1545;--border-light:#3d1f60;--border-focus:#bb86fc;
    --text:#e0d0f0;--text-muted:#9575cd;--text-dim:#7e57c2;
    --accent:#bb86fc;--accent-hover:#d1a8ff;
    --tag-bg:#261440;--tag-border:#3d1f60;--tag-hover:#351a55;
    --selected-tag-bg:#2d1555;--selected-tag-border:#4a2080;
    --cat-big-color:#bb86fc;--cat-active-bg:#1e0e35;
    --sub-heading-border:#2a1545;
    --toast-bg:#bb86fc;
    --scrollbar:#3d1f60;
  }
  [data-theme="light"]{
    --bg-main:#f5f5f5;--bg-sidebar:#ffffff;--bg-input:#fafafa;--bg-card:#ffffff;
    --bg-header:linear-gradient(135deg,#667eea,#764ba2);
    --border:#e0e0e0;--border-light:#d0d0d0;--border-focus:#667eea;
    --text:#333;--text-muted:#777;--text-dim:#999;
    --accent:#667eea;--accent-hover:#7c8ff8;
    --tag-bg:#fff;--tag-border:#d0d0d0;--tag-hover:#f0f0ff;
    --selected-tag-bg:#e8eaf6;--selected-tag-border:#c5cae9;
    --cat-big-color:#667eea;--cat-active-bg:#f0f0ff;
    --sub-heading-border:#e0e0e0;
    --toast-bg:#667eea;
    --scrollbar:#ccc;
  }
  [data-theme="sepia"]{
    --bg-main:#f4ece1;--bg-sidebar:#efe5d7;--bg-input:#f0e8da;--bg-card:#faf3e8;
    --bg-header:linear-gradient(135deg,#8d6e4c,#a68966);
    --border:#d4c4a8;--border-light:#c8b898;--border-focus:#8d6e4c;
    --text:#4a3728;--text-muted:#7a6652;--text-dim:#9a8672;
    --accent:#8d6e4c;--accent-hover:#a6845e;
    --tag-bg:#faf3e8;--tag-border:#d4c4a8;--tag-hover:#f0e4d0;
    --selected-tag-bg:#e8dcc8;--selected-tag-border:#c8b898;
    --cat-big-color:#8d6e4c;--cat-active-bg:#f0e4d0;
    --sub-heading-border:#d4c4a8;
    --toast-bg:#8d6e4c;
    --scrollbar:#c8b898;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg-main);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

  .header{background:var(--bg-header);padding:12px 24px;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .header-left h1{font-size:1.2rem;color:#fff;margin-bottom:2px;}
  .header-left p{font-size:.72rem;color:rgba(255,255,255,.7);}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

  .theme-btn{padding:4px 10px;border-radius:12px;border:2px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:.7rem;cursor:pointer;transition:.2s;white-space:nowrap;}
  .theme-btn:hover,.theme-btn.active{background:rgba(255,255,255,.2);border-color:#fff;}
  .search-wrap{position:relative;}
  .search-input{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:5px 12px 5px 30px;color:#fff;font-size:.78rem;width:180px;outline:none;}
  .search-input::placeholder{color:rgba(255,255,255,.5);}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.75rem;pointer-events:none;}
  .search-results{position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;max-height:300px;overflow-y:auto;z-index:200;display:none;margin-top:4px;}
  .search-results.show{display:block;}
  .search-result-item{padding:8px 12px;cursor:pointer;font-size:.78rem;border-bottom:1px solid var(--border);transition:.15s;}
  .search-result-item:hover{background:var(--tag-hover);}
  .search-result-item .sr-prompt{color:var(--accent);font-weight:600;}
  .search-result-item .sr-ja{color:var(--text-muted);margin-left:6px;}
  .search-result-item .sr-cat{color:var(--text-dim);font-size:.68rem;margin-left:6px;}

  .input-area{background:var(--bg-input);border-bottom:2px solid var(--border);padding:14px 24px;position:sticky;top:52px;z-index:99;transition:background .3s;}
  .input-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .input-label-row label{font-size:.82rem;color:var(--text-muted);}
  .token-counter{font-size:.75rem;padding:3px 10px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border-light);}
  .token-counter.warn{color:#ff9800;border-color:#ff9800;}
  .token-counter.danger{color:#f44336;border-color:#f44336;}
  .prompt-box-wrap{display:flex;gap:8px;align-items:flex-start;}
  .prompt-box{flex:1;min-height:60px;max-height:160px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.85rem;line-height:1.6;resize:vertical;outline:none;overflow-y:auto;word-break:break-all;transition:background .3s,border .3s;}
  .prompt-box:focus{border-color:var(--border-focus);}
  .btn-group{display:flex;flex-direction:column;gap:5px;}
  .btn{padding:7px 12px;border:none;border-radius:6px;cursor:pointer;font-size:.72rem;font-weight:600;transition:.2s;white-space:nowrap;}
  .btn-copy{background:var(--accent);color:#fff;}
  .btn-copy:hover{background:var(--accent-hover);}
  .btn-clear{background:var(--border-light);color:var(--text);}
  .btn-clear:hover{background:var(--text-dim);}
  .btn-preset{background:#2196F3;color:#fff;font-size:.68rem;}
  .btn-preset:hover{background:#42a5f5;}
  .btn-history{background:#ff9800;color:#fff;font-size:.68rem;}
  .btn-history:hover{background:#ffb74d;}

  .selected-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;min-height:20px;}
  .selected-tag{display:inline-flex;align-items:center;gap:3px;background:var(--selected-tag-bg);border:1px solid var(--selected-tag-border);border-radius:12px;padding:2px 8px;font-size:.72rem;color:var(--text);cursor:grab;animation:fadeIn .2s;user-select:none;transition:background .3s;}
  .selected-tag.dragging{opacity:.4;}
  .selected-tag .remove{cursor:pointer;color:var(--accent);font-weight:bold;font-size:.85rem;margin-left:2px;line-height:1;}
  .selected-tag .remove:hover{color:var(--accent-hover);}
  @keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

  .main{display:flex;height:calc(100vh - 210px);}

  .sidebar{width:220px;min-width:220px;background:var(--bg-sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;transition:background .3s;}
  .sidebar::-webkit-scrollbar{width:4px;}
  .sidebar::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px;}
  .cat-big{padding:6px 16px;font-size:.7rem;color:var(--cat-big-color);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:8px;}
  .cat-item{padding:7px 16px 7px 24px;font-size:.78rem;cursor:pointer;color:var(--text-muted);border-left:3px solid transparent;transition:.15s;}
  .cat-item:hover{background:var(--cat-active-bg);color:var(--text);}
  .cat-item.active{background:var(--cat-active-bg);color:var(--accent);border-left-color:var(--accent);}
  .cat-item.custom-cat{font-style:italic;}

  .content{flex:1;overflow-y:auto;padding:20px 24px;transition:background .3s;}
  .content::-webkit-scrollbar{width:6px;}
  .content::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px;}
  .content-title{font-size:1.05rem;font-weight:700;margin-bottom:14px;color:var(--text);}
  .sub-heading{font-size:.82rem;font-weight:700;color:var(--accent);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--sub-heading-border);}
  .sub-heading:first-of-type{margin-top:0;}
  .tag-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
  .tag-btn{padding:5px 12px;background:var(--tag-bg);border:1px solid var(--tag-border);border-radius:6px;color:var(--text-muted);font-size:.76rem;cursor:pointer;transition:.15s;user-select:none;}
  .tag-btn:hover{background:var(--tag-hover);border-color:var(--border-light);color:var(--text);}
  .tag-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tag-hint{font-size:.65rem;color:var(--text-dim);margin-left:3px;}
  .tag-btn.selected .tag-hint{color:rgba(255,255,255,.7);}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--toast-bg);color:#fff;padding:10px 20px;border-radius:8px;font-size:.82rem;opacity:0;transform:translateY(10px);transition:.3s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}

  /* Modal */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg-card);border:1px solid var(--border-light);border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;color:var(--text);}
  .modal h2{font-size:1rem;margin-bottom:16px;color:var(--accent);}
  .modal-close{float:right;cursor:pointer;font-size:1.2rem;color:var(--text-muted);background:none;border:none;}
  .modal-close:hover{color:var(--accent);}
  .modal label{font-size:.8rem;color:var(--text-muted);display:block;margin:10px 0 4px;}
  .modal input,.modal textarea{width:100%;padding:8px 12px;background:var(--bg-main);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-size:.82rem;outline:none;}
  .modal input:focus,.modal textarea:focus{border-color:var(--accent);}
  .modal textarea{min-height:60px;resize:vertical;}
  .modal-btn{margin-top:16px;padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;}
  .modal-btn:hover{background:var(--accent-hover);}

  .history-item{padding:10px;background:var(--bg-main);border:1px solid var(--border-light);border-radius:6px;margin-bottom:8px;cursor:pointer;font-size:.78rem;word-break:break-all;transition:.15s;}
  .history-item:hover{border-color:var(--accent);}
  .history-item .hi-date{font-size:.68rem;color:var(--text-dim);margin-bottom:4px;}
  .history-item .hi-del{float:right;color:var(--accent);cursor:pointer;font-size:.75rem;}

  .preset-item{padding:8px 12px;background:var(--bg-main);border:1px solid var(--border-light);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:.15s;}
  .preset-item:hover{border-color:var(--accent);}
  .preset-item .pi-name{font-weight:600;font-size:.8rem;color:var(--accent);}
  .preset-item .pi-prompt{font-size:.72rem;color:var(--text-muted);margin-top:2px;word-break:break-all;}

  @media(max-width:768px){
    .header{flex-direction:column;align-items:flex-start;}
    .header-right{width:100%;justify-content:flex-start;}
    .search-input{width:140px;}
    .main{height:auto;flex-direction:column;}
    .sidebar{width:100%;min-width:100%;max-height:180px;display:flex;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:0;}
    .cat-big{white-space:nowrap;padding:8px 10px;margin:0;}
    .cat-item{white-space:nowrap;border-left:none;border-bottom:3px solid transparent;padding:8px 10px;}
    .cat-item.active{border-bottom-color:var(--accent);border-left-color:transparent;}
    .content{padding:14px;}
    .input-area{top:auto;position:relative;}
  }
</style>
</head>
<body data-theme="dark">

<div class="header">
  <div class="header-left">
    <h1>🎨 SD Prompt Builder Pro</h1>
    <p>タグをクリック → 自動追加 → コピーしてSDへ</p>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="検索（英語/日本語）" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <button class="theme-btn active" data-theme="dark">🌑 ダーク</button>
    <button class="theme-btn" data-theme="midnight-blue">🌊 ブルー</button>
    <button class="theme-btn" data-theme="dark-purple">🔮 パープル</button>
    <button class="theme-btn" data-theme="light">☀️ ライト</button>
    <button class="theme-btn" data-theme="sepia">📜 セピア</button>
  </div>
</div>

<div class="input-area">
  <div class="input-label-row">
    <label>📝 プロンプト入力欄</label>
    <span class="token-counter" id="tokenCounter">トークン: 0 / 75</span>
  </div>
  <div class="prompt-box-wrap">
    <div class="prompt-box" id="promptBox"></div>
    <div class="btn-group">
      <button class="btn btn-copy" onclick="copyPrompt()">📋 コピー</button>
      <button class="btn btn-clear" onclick="clearAll()">🗑 全消去</button>
      <button class="btn btn-preset" onclick="openPresetModal()">⭐ プリセット</button>
      <button class="btn btn-history" onclick="openHistoryModal()">📂 履歴</button>
    </div>
  </div>
  <div class="selected-tags" id="selectedTags"></div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Preset Modal -->
<div class="modal-overlay" id="presetModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('presetModal')">&times;</button>
    <h2>⭐ プリセット</h2>
    <div id="presetList"></div>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('historyModal')">&times;</button>
    <h2>📂 コピー履歴</h2>
    <div id="historyList"></div>
  </div>
</div>

<!-- Custom Tag Modal -->
<div class="modal-overlay" id="customModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('customModal')">&times;</button>
    <h2>➕ カスタムプロンプト追加</h2>
    <label>英語プロンプト</label>
    <input id="customPromptEn" placeholder="例: galaxy print dress">
    <label>日本語メモ（任意）</label>
    <input id="customPromptJa" placeholder="例: 銀河柄ドレス">
    <label>サブカテゴリ名（任意・新規入力可）</label>
    <input id="customSubCat" placeholder="例: オリジナル">
    <button class="modal-btn" onclick="addCustomPrompt()">追加する</button>
  </div>
</div>

function showCategory(catName){
  currentCategory = catName;
  const cont = document.getElementById('content');
  const catData = DATA[catName];
  if(!catData){cont.innerHTML='';return;}

  let html = `<div class="content-title">${catName}</div>`;

  if(catName==='➕ マイプロンプト'){
    html += `<div style="margin-bottom:14px;"><button class="btn btn-copy" onclick="openCustomModal()" style="font-size:.78rem;">➕ 新しいプロンプトを追加</button></div>`;
  }

  const subs = Object.keys(catData);
  if(subs.length===0 && catName==='➕ マイプロンプト'){
    html += `<p style="color:var(--text-dim);font-size:.85rem;">まだカスタムプロンプトがありません。上のボタンから追加してください。</p>`;
  }

  subs.forEach(subName=>{
    html += `<div class="sub-heading">${esc(subName)}</div><div class="tag-grid">`;
    catData[subName].forEach(item=>{
      const sel = selectedPrompts.includes(item.p)?' selected':'';
      html += `<button class="tag-btn${sel}" data-prompt="${esc(item.p)}" title="${esc(item.j)}">${esc(item.p)}<span class="tag-hint">${esc(item.j)}</span></button>`;
    });
    html += `</div>`;
  });
  cont.innerHTML = html;

  cont.querySelectorAll('.tag-btn').forEach(btn=>{
    btn.addEventListener('click',()=>togglePrompt(btn.dataset.prompt, btn));
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ============================================================
//  TOGGLE / UPDATE
// ============================================================
function togglePrompt(prompt, btnEl){
  const idx = selectedPrompts.indexOf(prompt);
  if(idx>-1){selectedPrompts.splice(idx,1);if(btnEl)btnEl.classList.remove('selected');}
  else{selectedPrompts.push(prompt);if(btnEl)btnEl.classList.add('selected');}
  updateDisplay();
}

function updateDisplay(){
  document.getElementById('promptBox').textContent = selectedPrompts.join(', ');
  // token counter
  const tc = document.getElementById('tokenCounter');
  const count = selectedPrompts.reduce((a,p)=>a+p.split(/\s+/).length, 0);
  tc.textContent = `トークン: 約${count} / 75`;
  tc.className = 'token-counter' + (count>75?' danger':count>60?' warn':'');

  // selected tags
  const tagsEl = document.getElementById('selectedTags');
  let html = '';
  selectedPrompts.forEach((p,i)=>{
    html += `<span class="selected-tag" draggable="true" data-idx="${i}" data-prompt="${esc(p)}">${esc(p)}<span class="remove" data-prompt="${esc(p)}">&times;</span></span>`;
  });
  tagsEl.innerHTML = html;

  tagsEl.querySelectorAll('.remove').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();removePrompt(el.dataset.prompt);});
  });

  // drag
  tagsEl.querySelectorAll('.selected-tag').forEach(tag=>{
    tag.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('text/plain',tag.dataset.idx);
      tag.classList.add('dragging');
    });
    tag.addEventListener('dragend',()=>tag.classList.remove('dragging'));
    tag.addEventListener('dragover',e=>{e.preventDefault();});
    tag.addEventListener('drop',e=>{
      e.preventDefault();
      const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
      const toIdx = parseInt(tag.dataset.idx);
      if(fromIdx!==toIdx){
        const item = selectedPrompts.splice(fromIdx,1)[0];
        selectedPrompts.splice(toIdx,0,item);
        updateDisplay();
        refreshContentBtns();
      }
    });
  });
}

function refreshContentBtns(){
  document.querySelectorAll('.tag-btn').forEach(btn=>{
    btn.classList.toggle('selected', selectedPrompts.includes(btn.dataset.prompt));
  });
}

function removePrompt(prompt){
  const idx = selectedPrompts.indexOf(prompt);
  if(idx>-1) selectedPrompts.splice(idx,1);
  updateDisplay();
  refreshContentBtns();
}

// ============================================================
//  COPY / CLEAR
// ============================================================
function copyPrompt(){
  const text = selectedPrompts.join(', ');
  if(!text){showToast('⚠ プロンプトが選択されていません');return;}
  navigator.clipboard.writeText(text).then(()=>{
    showToast('✅ コピーしました！');
    saveHistory(text);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('✅ コピーしました！');
    saveHistory(text);
  });
}

function clearAll(){
  selectedPrompts=[];
  updateDisplay();
  refreshContentBtns();
  showToast('🗑 全消去しました');
}

//  HISTORY
// ============================================================
function saveHistory(text){
  const entry = {text, date:new Date().toLocaleString('ja-JP')};
  copyHistory.unshift(entry);
  if(copyHistory.length>20) copyHistory.pop();
  localStorage.setItem('sdpb_history', JSON.stringify(copyHistory));
}

function openHistoryModal(){
  const list = document.getElementById('historyList');
  if(copyHistory.length===0){list.innerHTML='<p style="color:var(--text-dim);font-size:.82rem;">まだ履歴がありません</p>';}
  else{
    list.innerHTML = copyHistory.map((h,i)=>`<div class="history-item" data-idx="${i}"><span class="hi-del" data-idx="${i}">🗑</span><div class="hi-date">${esc(h.date)}</div>${esc(h.text)}</div>`).join('');
    list.querySelectorAll('.history-item').forEach(el=>{
      el.addEventListener('click',e=>{
        if(e.target.classList.contains('hi-del')){
          copyHistory.splice(parseInt(e.target.dataset.idx),1);
          localStorage.setItem('sdpb_history',JSON.stringify(copyHistory));
          openHistoryModal();
          return;
        }
        const h = copyHistory[parseInt(el.dataset.idx)];
        selectedPrompts = h.text.split(', ').filter(Boolean);
        updateDisplay();
        refreshContentBtns();
        closeModal('historyModal');
        showToast('📂 履歴を読み込みました');
      });
    });
  }
  document.getElementById('historyModal').classList.add('show');
}

function addCustomPrompt(){
  const en = document.getElementById('customPromptEn').value.trim();
  const ja = document.getElementById('customPromptJa').value.trim()||en;
  const sub = document.getElementById('customSubCat').value.trim()||'✏️ カスタム';

  customData[sub].push({p:en,j:ja});

  DATA["➕ マイプロンプト"] = {...customData};
  buildSearchIndex();
  closeModal('customModal');
  showCategory('➕ マイプロンプト');
  showToast('✅ カスタムプロンプトを追加しました');
}

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
searchInput.addEventListener('input',()=>{
  const q = searchInput.value.trim().toLowerCase();
  if(!q){searchResults.classList.remove('show');return;}
  const hits = searchIndex.filter(x=> x.p.toLowerCase().includes(q)||x.j.toLowerCase().includes(q)).slice(0,30);
  if(!hits.length){searchResults.innerHTML='<div style="padding:10px;font-size:.78rem;color:var(--text-dim);">見つかりません</div>';searchResults.classList.add('show');return;}
  searchResults.innerHTML = hits.map(h=>`<div class="search-result-item" data-prompt="${esc(h.p)}"><span class="sr-prompt">${esc(h.p)}</span><span class="sr-ja">${esc(h.j)}</span><span class="sr-cat">${esc(h.cat)}</span></div>`).join('');
  searchResults.classList.add('show');
  searchResults.querySelectorAll('.search-result-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const p = el.dataset.prompt;
      if(!selectedPrompts.includes(p)) selectedPrompts.push(p);
      updateDisplay();
      refreshContentBtns();
      searchInput.value='';
      searchResults.classList.remove('show');
      showToast(`✅ "${p}" を追加`);
    });
  });
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
});

// ============================================================
//  MODAL
// ============================================================
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show');});
});

// ============================================================
//  TOAST
// ============================================================
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ============================================================
//  INIT
// ============================================================
buildSidebar();
</script>
</body>
</html>
